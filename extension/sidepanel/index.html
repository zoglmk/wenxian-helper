<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>文献助手</title>
</head>
<body>
  <div class="app">
    <!-- Nav -->
    <nav class="nav">
      <button class="nav-item active" data-feature="download">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        批量下载
      </button>
      <button class="nav-item" data-feature="doi">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        DOI导入
      </button>
    </nav>

    <!-- Feature: Download -->
    <div class="feature" id="feature-download">
      <!-- Controls -->
      <div class="controls">
        <div class="controls-btns">
          <button class="btn btn-accent" id="btn-add-page">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            添加本页
          </button>
          <button class="btn btn-accent" id="btn-fetch-links">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            获取链接
          </button>
        </div>
        <div class="controls-toggles">
          <label class="toggle" title="通过 WebVPN 访问知网时开启">
            <input type="checkbox" id="toggle-webvpn">
            <span class="toggle-switch"></span>
            <span class="toggle-text">WebVPN</span>
          </label>
          <label class="toggle" title="异步加载期刊等级信息">
            <input type="checkbox" id="toggle-levels" checked>
            <span class="toggle-switch"></span>
            <span class="toggle-text">等级</span>
          </label>
          <label class="toggle" title="触发知网验证码时自动在新标签页打开失败链接，便于直接输入验证码">
            <input type="checkbox" id="toggle-auto-open-verify" checked>
            <span class="toggle-switch"></span>
            <span class="toggle-text">自动跳转</span>
          </label>
        </div>
      </div>

      <!-- Download folder -->
      <div class="folder-row">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <input type="text" id="input-folder" class="folder-input" placeholder="子文件夹（留空则存默认位置）">
        <span class="folder-tip" id="folder-tip"></span>
      </div>

      <!-- Progress -->
      <div class="progress" id="progress" hidden>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-text" id="progress-text">获取中...</span>
      </div>

      <!-- List header -->
      <div class="list-header" id="list-header" hidden>
        <div class="list-header-left">
          <label class="check">
            <input type="checkbox" id="select-all">
            <span class="check-box"></span>
          </label>
          <span class="list-count" id="list-count">0 条</span>
          <div class="sort-pills">
            <button class="sort-pill active" data-sort="">默认</button>
            <button class="sort-pill" data-sort="date">时间</button>
            <button class="sort-pill" data-sort="quote">被引</button>
            <button class="sort-pill" data-sort="download">下载</button>
          </div>
        </div>
        <div class="list-header-right">
          <button class="btn btn-ghost btn-sm" id="btn-export" title="导出文献清单 (CSV / BibTeX / RIS)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            导出
          </button>
          <button class="btn btn-ghost btn-sm" id="btn-clear">清空</button>
          <button class="btn btn-warn btn-sm" id="btn-retry-failed" hidden>
            重试失败
          </button>
          <button class="btn btn-warn btn-sm" id="btn-resume" hidden>
            继续下载
          </button>
          <button class="btn btn-accent btn-sm" id="btn-batch-dl">
            下载 <span id="dl-count"></span>
          </button>
        </div>
      </div>

      <!-- Paper list -->
      <div class="paper-list" id="paper-list"></div>

      <!-- Paper list -->
    </div>

    <!-- Feature: DOI Import -->
    <div class="feature" id="feature-doi" hidden>
      <div class="doi-panel">
        <div class="doi-tip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          仅用于获取英文文献，支持 WoS、PubMed 等平台导出的 DOI。每行一个，获取后文献将加入下方下载列表。
        </div>
        <textarea class="doi-input" id="doi-input" placeholder="粘贴 DOI，每行一个，例如：&#10;10.1016/j.cell.2024.01.001&#10;10.1038/s41586-024-07487-w"></textarea>
        <div class="doi-actions">
          <span class="doi-count" id="doi-count"></span>
          <button class="btn btn-accent" id="btn-doi-import">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导入并获取链接
          </button>
          <button class="btn btn-ghost" id="btn-doi-stop" hidden>停止</button>
          <button class="btn btn-ghost" id="btn-doi-copy-failed" hidden>复制失败 DOI 列表</button>
        </div>
        <div class="progress" id="doi-progress" hidden>
          <div class="progress-bar">
            <div class="progress-fill" id="doi-progress-fill"></div>
          </div>
          <span class="progress-text" id="doi-progress-text">查询中...</span>
        </div>
      </div>
    </div>

    <!-- Log Panel (shared across tabs) -->
    <div class="log-panel" id="log-panel" hidden>
      <div class="log-panel-header">
        <span class="log-panel-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          日志
          <span class="log-badge" id="log-badge">0</span>
        </span>
        <div class="log-panel-actions">
          <button class="btn btn-ghost btn-sm" id="log-copy-all" title="复制全部日志">复制</button>
          <button class="btn btn-ghost btn-sm" id="log-clear" title="清空日志">清空</button>
        </div>
      </div>
      <div class="log-list" id="log-list"></div>
    </div>

    <!-- Update Banner -->
    <div class="update-banner" id="update-banner" hidden>
      <span class="update-text" id="update-text"></span>
      <button class="update-close" id="update-close" title="关闭">&times;</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer-status" id="footer-status"></span>
      <div class="footer-right">
        <div class="qr-link">
          <span class="qr-trigger">☕ 赞赏</span>
          <div class="qr-popup">
            <img src="../icons/tip-qrcode.jpg" alt="赞赏码" width="160" height="160" class="tip-qr-img">
            <div class="tip-qr-placeholder" hidden>
              <span>二维码占位</span>
              <span class="tip-qr-hint">放入<br>icons/tip-qrcode.jpg</span>
            </div>
            <span class="qr-tip">请作者喝杯咖啡吧～</span>
          </div>
        </div>
        <span class="footer-sep">|</span>
        <div class="qr-link">
          <span class="qr-trigger">公众号: zgmgm</span>
          <div class="qr-popup">
            <img src="../icons/qrcode.jpg" alt="公众号二维码" width="160" height="160">
            <span class="qr-tip">扫码关注</span>
          </div>
        </div>
        <span class="footer-sep">|</span>
        <button class="log-toggle-btn" id="log-toggle" title="显示/隐藏日志">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          日志
          <span class="log-badge-mini" id="log-badge-footer" hidden>0</span>
        </button>
        <span class="footer-ver">v1.2.0</span>
      </div>
    </footer>
  </div>

  <script src="index.js"></script>
</body>
</html>
